name: Release Desktop

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      release_tag:
        description: 'Tag do release, por exemplo v1.0.6'
        required: true
        type: string

permissions:
  contents: write

concurrency:
  group: release-desktop-${{ github.event_name == 'workflow_dispatch' && inputs.release_tag || github.ref_name }}
  cancel-in-progress: true

jobs:
  build:
    name: Build ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            name: Windows
            output_suffix: windows
            build_args: --win nsis
            artifact_name: windows-desktop
          - os: ubuntu-latest
            name: Linux
            output_suffix: linux
            build_args: --linux AppImage deb
            artifact_name: linux-desktop

    env:
      GH_OWNER: ${{ github.repository_owner }}
      GH_REPO: ${{ github.event.repository.name }}
      ELECTRON_BUILDER_OUTPUT: dist-electron-builds/${{ github.ref_name }}/${{ matrix.output_suffix }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install Linux dependencies
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y libfuse2

      - name: Install dependencies
        run: npm ci

      - name: Build package
        run: npx electron-builder --config electron-builder.config.js ${{ matrix.build_args }} --publish never

      - name: Upload Windows artifacts
        if: matrix.os == 'windows-latest'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: |
            ${{ env.ELECTRON_BUILDER_OUTPUT }}/Koala-*.exe
            ${{ env.ELECTRON_BUILDER_OUTPUT }}/Koala-*.exe.blockmap
            ${{ env.ELECTRON_BUILDER_OUTPUT }}/latest.yml
          if-no-files-found: error

      - name: Upload Linux artifacts
        if: matrix.os == 'ubuntu-latest'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: |
            ${{ env.ELECTRON_BUILDER_OUTPUT }}/Koala-*.AppImage
            ${{ env.ELECTRON_BUILDER_OUTPUT }}/koala_*.deb
            ${{ env.ELECTRON_BUILDER_OUTPUT }}/latest-linux.yml
          if-no-files-found: error

  release:
    name: Publish Release
    runs-on: ubuntu-latest
    needs:
      - build
    env:
      RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.release_tag || github.ref_name }}
    steps:
      - name: Download Windows artifacts
        uses: actions/download-artifact@v4
        with:
          name: windows-desktop
          path: release-assets/windows

      - name: Download Linux artifacts
        uses: actions/download-artifact@v4
        with:
          name: linux-desktop
          path: release-assets/linux

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          name: ${{ env.RELEASE_TAG }}
          draft: false
          prerelease: false
          overwrite_files: true
          files: |
            release-assets/windows/**/*
            release-assets/linux/**/*
