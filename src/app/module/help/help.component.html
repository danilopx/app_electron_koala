<div class="help-page">
  <po-container [p-no-border]="true" class="po-m-2">
    <section class="help-hero">
      <span class="help-eyebrow">Ajuda</span>
      <h2 class="help-title">Guia rapido das rotinas</h2>
      <p class="help-description">
        Resumo direto do que o sistema faz, do que o usuario precisa preencher e das regras que mais causam duvida.
      </p>
    </section>

    <nav class="help-topics" aria-label="Topicos de ajuda">
      <button
        type="button"
        class="help-topic"
        *ngFor="let topic of topics"
        [class.is-active]="selectedSectionId === topic.target"
        (click)="selectSection(topic.target)"
      >
        <span class="help-topic-label">{{ topic.label }}</span>
        <span class="help-topic-note">{{ topic.note }}</span>
      </button>
    </nav>

    <section class="help-panel">
      <div class="help-panel-header">
        <span class="help-panel-badge">{{ selectedSection.note }}</span>
        <h3>{{ selectedSection.title }}</h3>
        <p>{{ selectedSection.description }}</p>
      </div>

      <ul class="help-panel-list">
        <li *ngFor="let item of selectedSection.items">{{ item }}</li>
      </ul>
    </section>
  </po-container>
</div>
